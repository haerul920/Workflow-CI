name: Workflow CI MLflow & Docker

on:
  push:
    branches: [main]

jobs:
  build-train-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLProject (Training)
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifacts
          path: MLProject/mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker MLflow Model
        run: |
          cd MLProject

          MODEL_PATH=$(find $PWD/mlruns -type d -name "model" | head -n 1)

          mlflow models build-docker -m "$MODEL_PATH" -n "${{ secrets.DOCKER_USERNAME }}/titanic-sml-model:latest" --env-manager=local

          docker push "${{ secrets.DOCKER_USERNAME }}/titanic-sml-model:latest"
